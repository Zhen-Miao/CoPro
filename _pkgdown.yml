      - runSkrCCAPermu_FairSigma
      - computeNormalizedCorrelationPermu
      - resample_spatial
      - generate_toroidal_permutations
      - compute_ground_truth_ncorr
      - calculate_pvalue

  - title: "Visualization"
    desc: "Plotting functions"
    contents:
      - plotG12Functions
      - diagnose_bin_distribution

  - title: "Utilities"
    desc: "Helper and optimization functions"
    contents:
      - copro_download_data
      - assignDistanceManually
      - optimize_bilinear
      - optimize_bilinear_multi_slides
      - optimize_bilinear_n
      - optimize_bilinear_n_multi_slides

articles:
  - title: "Getting Started"
    navbar: "Getting Started"
    contents:
      - organoid_one_type
      - brain_merfish_two_type

  - title: "Advanced Analyses"
    navbar: "Advanced"
