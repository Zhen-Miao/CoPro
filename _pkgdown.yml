url: https://zhen-miao.github.io/CoPro/

template:
  bootstrap: 5
  bootswatch: flatly

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: "Object Creation"
    desc: "Create CoPro objects from spatial transcriptomics data"
    contents:
      - newCoProSingle
      - newCoProMulti
      - CreateCoPro
      - CoPro-class
      - subsetData
      - "`show,CoPro-method`"

  - title: "Core Pipeline"
    desc: "The main CoPro analysis workflow"
    contents:
      - computePCA
      - "`computePCA,CoProSingle-method`"
      - computeDistance
      - computeKernelMatrix
      - runSkrCCA
      - computeNormalizedCorrelation
      - computeGeneAndCellScores
      - computeRegressionGeneScores

  - title: "Results Access"
    desc: "Retrieve analysis results"
    contents:
      - getCellScores
      - getCellScoresInSitu
      - getNormCorr
      - getCorrOneType
      - getCorrTwoTypes
      - getDistMat
      - getSelfDistMat
      - getKernelMatrix
      - getSelfKernelMatrix
      - getColocScores
      - getSlideID
      - getSlideList
      - isMultiSlide

  - title: "Score Transfer"
    desc: "Transfer learned patterns to new slides or datasets"
    contents:
      - getTransferCellScores
      - getTransferNormCorr
      - getTransferBidirCorr
      - getTransferSelfBidirCorr
      - quantile_normalize
      - transfer_scores

  - title: "Within-Cell-Type Analysis"
